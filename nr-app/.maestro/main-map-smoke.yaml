appId: org.trustroots.nostroots
---
- openLink: "nostroots://e2e/reset"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- launchApp:
    clearState: true
- runFlow:
    when:
      visible:
        id: "screen-welcome"
    commands:
      - tapOn:
          id: "welcome-get-started-button"
- runFlow:
    when:
      visible:
        id: "identity-skip-button"
    commands:
      - tapOn:
          id: "identity-skip-button"
- runFlow:
    when:
      visible:
        id: "identity-continue-button"
    commands:
      - tapOn:
          id: "identity-continue-button"
- runFlow:
    when:
      visible:
        id: "identity-skip-button"
    commands:
      - tapOn:
          id: "identity-skip-button"
- extendedWaitUntil:
    visible:
      id: "screen-map"
    timeout: 30000
- tapOn:
    id: "nav-list"
- assertVisible: "Discover"
- tapOn:
    id: "nav-settings"
- assertVisible:
    id: "screen-settings"
