# Deploy Nostroots Web App to GitHub Pages
name: Deploy Web App

on:
  push:
    branches:
      - main
    paths:
      - "nr-web/**"
      - ".github/workflows/deploy-web.yml"

  # Allow manual trigger
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    env:
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Write deploy metadata
        run: |
          node -e "const fs=require('fs'); const p='nr-web/deploy-metadata.json'; const data={commitSha: process.env.GITHUB_SHA, commitUrl: 'https://github.com/Trustroots/nostroots/commit/' + process.env.GITHUB_SHA, commitTimestamp: process.env.COMMIT_TIMESTAMP, deployWorkflowUrl: 'https://github.com/Trustroots/nostroots/actions/workflows/deploy-web.yml', deployRunUrl: 'https://github.com/Trustroots/nostroots/actions/runs/' + process.env.GITHUB_RUN_ID, deployTimestamp: new Date().toISOString()}; fs.writeFileSync(p, JSON.stringify(data, null, 2));"
        env:
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: './nr-web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
