services:
  nip42relay:
    build: .
    depends_on:
      - strfry
    environment:
      LISTEN_ADDR: ":8042"
      PUBLIC_RELAY_URL: "ws://localhost:8042"
      UPSTREAM_RELAY_URL: "ws://strfry:5542"
      AUTH_CACHE_PATH: "/data/auth-cache.db"
      TRUSTROOTS_NIP05_BASE_URL: "https://www.trustroots.org/.well-known/nostr.json"
      AUTH_CACHE_TTL: "24h"
      AUTH_EVENT_MAX_AGE: "10m"
    ports:
      - "8042:8042"
    volumes:
      - nip42relay-data:/data

  nostr-ingestor:
    build: .
    command: ["nostr-ingestor"]
    depends_on:
      - nip42relay
    restart: unless-stopped
    environment:
      NSEC: "${NSEC:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      MATRIX_ACCESS_TOKEN: "${MATRIX_ACCESS_TOKEN:-}"
      BRIDGE_STATE_PATH: "/data/bridge-state.db"
      BRIDGE_MATRIX_HOMESERVER: "https://matrix.org"
      BRIDGE_TARGET_RELAY_URL: "ws://nip42relay:8042"
      PUBLIC_RELAY_URL: "ws://localhost:8042"
    volumes:
      - nip42relay-data:/data

  strfry:
    image: ghcr.io/hoytech/strfry:latest
    volumes:
      - ./strfry/strfry.conf:/etc/strfry.conf:ro
      - strfry-data:/app/strfry-db

volumes:
  nip42relay-data:
  strfry-data:
