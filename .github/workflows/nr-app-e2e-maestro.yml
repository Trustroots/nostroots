name: nr-app Maestro E2E

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "nr-app/**"
      - "nr-bridge/**"
      - "development-utils/local-relay/**"
      - ".github/workflows/nr-app-e2e-maestro.yml"
      - ".devcontainer/**"

concurrency:
  group: nr-app-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;27.0.12077973" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: pnpm install

      - name: Build Android E2E APK locally
        working-directory: nr-app
        run: pnpm run build:android-e2e-local

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start deterministic E2E network
        run: docker compose -f nr-app/e2e/docker-compose.yml -f nr-app/e2e/docker-compose.ci.yml up -d --build --wait

      - name: Wait for E2E network
        run: |
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:7777 >/dev/null
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:8025 >/dev/null
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:8000 >/dev/null

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: |
            adb install -r nr-app/builds/app-e2e-debug.apk
            cd nr-app
            pnpm run test:maestro:local -- .maestro/main-map-smoke.yaml

      - name: Upload Maestro artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-maestro-artifacts
          path: |
            ~/.maestro/tests
            nr-app/builds/app-e2e-debug.apk
            nr-app/.e2e-logs/android

      - name: Dump E2E network logs
        if: failure()
        run: docker compose -f nr-app/e2e/docker-compose.yml -f nr-app/e2e/docker-compose.ci.yml logs --no-color

      - name: Stop E2E network
        if: always()
        run: docker compose -f nr-app/e2e/docker-compose.yml -f nr-app/e2e/docker-compose.ci.yml down -v

  ios-maestro:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'ios-e2e')
    runs-on: macos-15
    timeout-minutes: 120
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/trustroots-dev
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@nostroots.local
      DENO_KV_PATH: ":memory:"
      DEEP_LINK_BASE: "nostroots://verify"
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install macOS E2E dependencies
        run: |
          brew tap mongodb/brew
          brew install mongodb-community@7.0 mongosh mailpit
          echo "$(brew --prefix mongodb-community@7.0)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix mongosh)/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pnpm install

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build and install iOS E2E app locally
        working-directory: nr-app
        run: pnpm run build:ios-e2e-local

      - name: Start deterministic E2E network
        run: |
          mkdir -p nr-app/.e2e-logs/ios "$RUNNER_TEMP/mongodb"

          mongod \
            --dbpath "$RUNNER_TEMP/mongodb" \
            --bind_ip 127.0.0.1 \
            --port 27017 \
            --logpath "$PWD/nr-app/.e2e-logs/ios/mongodb.log" \
            --fork

          MONGO_INITDB_DATABASE=trustroots-dev ./.devcontainer/nr-bridge/init-mongo.sh

          mailpit \
            --listen 127.0.0.1:8025 \
            --smtp 127.0.0.1:1025 \
            >nr-app/.e2e-logs/ios/mailpit.log 2>&1 &
          echo "$!" >nr-app/.e2e-logs/ios/mailpit.pid

          deno task --config development-utils/local-relay/deno.jsonc run-tiny \
            >nr-app/.e2e-logs/ios/tiny-relay.log 2>&1 &
          echo "$!" >nr-app/.e2e-logs/ios/tiny-relay.pid

          (
            cd nr-bridge
            deno task run
          ) >nr-app/.e2e-logs/ios/nr-bridge.log 2>&1 &
          echo "$!" >nr-app/.e2e-logs/ios/nr-bridge.pid

      - name: Wait for E2E network
        run: |
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:7777 >/dev/null
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:8025 >/dev/null
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:8000 >/dev/null

      - name: Run iPhone Maestro flows
        working-directory: nr-app
        run: pnpm run test:maestro:ios:local

      - name: Upload iOS Maestro artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-maestro-artifacts
          path: |
            ~/.maestro/tests
            nr-app/.e2e-logs/ios

      - name: Dump iOS E2E network logs
        if: failure()
        run: |
          for log_file in nr-app/.e2e-logs/ios/*.log; do
            if [ -f "$log_file" ]; then
              echo "===== ${log_file} ====="
              tail -n 200 "$log_file"
            fi
          done

      - name: Stop iOS E2E network
        if: always()
        run: |
          for pid_file in nr-app/.e2e-logs/ios/*.pid; do
            if [ -f "$pid_file" ]; then
              kill "$(cat "$pid_file")" 2>/dev/null || true
            fi
          done
          mongod --dbpath "$RUNNER_TEMP/mongodb" --shutdown >/dev/null 2>&1 || true
