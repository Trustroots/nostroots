<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nostroots Tests</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #111827;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 100%;
        margin: 0 auto;
        padding: 8px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.15rem;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .tab-btn {
        width: auto;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #111827;
        color: #e5e7eb;
        font-weight: 600;
      }
      .tab-btn.active {
        background: #2563eb;
        border-color: #2563eb;
      }
      .tab-panel[hidden] {
        display: none !important;
      }
      .layout {
        display: grid;
        gap: 10px;
      }
      .controls {
        display: grid;
        gap: 10px;
      }
      .card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px;
      }
      label {
        display: block;
        font-size: 0.82rem;
        margin-bottom: 4px;
      }
      input, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #111827;
        color: #e5e7eb;
        padding: 8px;
      }
      button {
        cursor: pointer;
        background: #2563eb;
        border: 0;
        font-weight: 600;
        font-size: 0.92rem;
      }
      button.secondary {
        background: #374151;
      }
      .row {
        display: grid;
        gap: 10px;
      }
      @media (min-width: 720px) {
        .row.two {
          grid-template-columns: 1fr 1fr;
        }
      }
      .status {
        font-size: 0.82rem;
        line-height: 1.25;
        color: #93c5fd;
        margin-top: 4px;
        white-space: pre-wrap;
        max-height: 10em;
        overflow-y: auto;
      }
      .status-card {
        padding: 8px 10px;
      }
      .kind-filter-controls {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .kind-filter-controls button {
        width: auto;
        padding: 6px 10px;
        font-size: 0.8rem;
      }
      .kind-filter-list {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        max-height: 140px;
        overflow-y: auto;
      }
      .kind-filter-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid #374151;
        border-radius: 999px;
        padding: 4px 8px;
        background: #111827;
        font-size: 0.8rem;
      }
      .kind-filter-item input {
        width: auto;
        margin: 0;
        padding: 0;
      }
      .notes {
        display: grid;
        gap: 8px;
        max-height: calc(100vh - 90px);
        overflow-y: auto;
      }
      .note {
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 8px;
        background: #111827;
      }
      .meta {
        color: #9ca3af;
        font-size: 0.8rem;
        margin-bottom: 6px;
      }
      .meta a {
        color: #93c5fd;
        text-decoration: none;
      }
      .meta a:hover {
        text-decoration: underline;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .raw-log {
        margin-top: 8px;
        max-height: 180px;
        overflow-y: auto;
        overflow-x: hidden;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 8px;
        background: #0b1220;
        font-size: 0.75rem;
        line-height: 1.35;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .image-tests {
        display: grid;
        gap: 10px;
      }
      .image-url-input {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .image-preview {
        max-width: min(100%, 700px);
        max-height: 340px;
        border: 1px solid #374151;
        border-radius: 8px;
        background: #0b1220;
        object-fit: contain;
      }
      .image-test-row {
        display: grid;
        gap: 8px;
      }
      @media (min-width: 900px) {
        .layout {
          grid-template-columns: minmax(360px, 0.95fr) minmax(0, 1.25fr);
          align-items: start;
        }
        .controls {
          position: sticky;
          top: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Nostroots Tests</h1>
      <div class="tabs">
        <button id="relayTabBtn" class="tab-btn active" type="button">Relay tests</button>
        <button id="imageTabBtn" class="tab-btn" type="button">Image tests</button>
      </div>

      <section id="relayTabPanel" class="tab-panel">
        <div class="layout">
        <div class="controls">
          <section class="card">
            <div>
              <label for="relayUrl">Relay URL</label>
              <input id="relayUrl" value="wss://relay.trustroots.org" />
            </div>
          </section>
          <section class="card">
            <label for="nsec">Private key for AUTH (optional)</label>
            <input
              id="nsec"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="nsec1..."
              autofocus
            />
          </section>

          <section class="card row two">
            <button id="connectBtn">Connect + Subscribe Notes</button>
            <button id="closeBtn" class="secondary">Disconnect</button>
          </section>

          <section class="card status-card">
            <div><strong>Status</strong></div>
            <div id="status" class="status">Idle.</div>
            <div id="rawLog" class="raw-log"></div>
          </section>

          <section class="card">
            <div><strong>Kinds filter</strong></div>
            <div class="kind-filter-controls">
              <button id="kindsAllBtn" type="button" class="secondary">Show all</button>
              <button id="kindsNoneBtn" type="button" class="secondary">Hide all</button>
            </div>
            <div id="kindFilterList" class="kind-filter-list"></div>
          </section>
        </div>

        <section class="card">
          <div style="margin-bottom: 6px;"><strong>Notes</strong></div>
          <div id="notes" class="notes"></div>
        </section>
        </div>
      </section>

      <section id="imageTabPanel" class="tab-panel" hidden>
        <div class="image-tests">
          <section class="card status-card">
            <div><strong>Image test status</strong></div>
            <div id="imageStatus" class="status">Idle.</div>
          </section>

          <section class="card image-test-row">
            <label for="imageUrl1">Image URL 1</label>
            <input
              id="imageUrl1"
              class="image-url-input"
              value="https://www.trustroots.org/uploads-circle/hitchhikers/1400x900.webp"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="testImageBtn1" type="button">Test image 1</button>
            <div id="imageResult1" class="status">Not tested yet.</div>
            <img id="imagePreview1" class="image-preview" alt="Image test preview 1" hidden />
          </section>

          <section class="card image-test-row">
            <label for="imageUrl2">Image URL 2</label>
            <input
              id="imageUrl2"
              class="image-url-input"
              value="https://www.trustroots.org/uploads-profile/6656f7f1874d670038f5aa94/avatar/256.jpg"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="testImageBtn2" type="button">Test image 2</button>
            <div id="imageResult2" class="status">Not tested yet.</div>
            <img id="imagePreview2" class="image-preview" alt="Image test preview 2" hidden />
          </section>

          <section class="card row two">
            <button id="testAllImagesBtn" type="button">Test both images</button>
            <button id="clearImageResultsBtn" type="button" class="secondary">Clear image results</button>
          </section>
        </div>
      </section>
    </div>

    <script type="module">
      import { finalizeEvent, verifyEvent, getPublicKey } from "https://esm.sh/nostr-tools@2.7.2/pure?target=es2020";
      import { nip19 } from "https://esm.sh/nostr-tools@2.7.2?target=es2020";

      const relayUrlInput = document.getElementById("relayUrl");
      const nsecInput = document.getElementById("nsec");
      const statusEl = document.getElementById("status");
      const rawLogEl = document.getElementById("rawLog");
      const notesEl = document.getElementById("notes");
      const connectBtn = document.getElementById("connectBtn");
      const closeBtn = document.getElementById("closeBtn");
      const kindsAllBtn = document.getElementById("kindsAllBtn");
      const kindsNoneBtn = document.getElementById("kindsNoneBtn");
      const kindFilterListEl = document.getElementById("kindFilterList");
      const relayTabBtn = document.getElementById("relayTabBtn");
      const imageTabBtn = document.getElementById("imageTabBtn");
      const relayTabPanel = document.getElementById("relayTabPanel");
      const imageTabPanel = document.getElementById("imageTabPanel");
      const imageStatusEl = document.getElementById("imageStatus");
      const imageUrl1Input = document.getElementById("imageUrl1");
      const imageUrl2Input = document.getElementById("imageUrl2");
      const testImageBtn1 = document.getElementById("testImageBtn1");
      const testImageBtn2 = document.getElementById("testImageBtn2");
      const testAllImagesBtn = document.getElementById("testAllImagesBtn");
      const clearImageResultsBtn = document.getElementById("clearImageResultsBtn");
      const imageResult1El = document.getElementById("imageResult1");
      const imageResult2El = document.getElementById("imageResult2");
      const imagePreview1El = document.getElementById("imagePreview1");
      const imagePreview2El = document.getElementById("imagePreview2");

      let ws = null;
      let subId = null;
      let authPubkey = null;
      let latestChallenge = null;
      let secretKey = null;
      let noteEvents = [];
      let statusLines = [];
      let rawLines = [];
      const discoveredKinds = new Set();
      const hiddenKinds = new Set();
      const nsecStorageKey = "nip42test.nsec";
      const relayUrlStorageKey = "nip42test.relayUrl";
      const STATUS_MAX_LINES = 20;
      const RAW_MAX_LINES = 120;
      const imageUrlStorageKey1 = "trustroots.imageTestUrl1";
      const imageUrlStorageKey2 = "trustroots.imageTestUrl2";

      function showTab(tabName) {
        const isRelay = tabName === "relay";
        relayTabPanel.hidden = !isRelay;
        imageTabPanel.hidden = isRelay;
        relayTabBtn.classList.toggle("active", isRelay);
        imageTabBtn.classList.toggle("active", !isRelay);
      }

      function setImageStatus(message) {
        imageStatusEl.textContent = message;
      }

      function formatImageResult(ok, details) {
        return ok ? `PASS: ${details}` : `FAIL: ${details}`;
      }

      function testImage(url, previewEl, resultEl) {
        return new Promise((resolve) => {
          const value = String(url || "").trim();
          if (!value) {
            previewEl.hidden = true;
            previewEl.removeAttribute("src");
            const msg = "URL is empty.";
            resultEl.textContent = formatImageResult(false, msg);
            resolve({ ok: false, message: msg });
            return;
          }

          const startedAt = performance.now();
          const tester = new Image();
          const bust = value.includes("?") ? "&" : "?";
          tester.src = `${value}${bust}_ts=${Date.now()}`;

          tester.onload = () => {
            const elapsedMs = Math.round(performance.now() - startedAt);
            previewEl.src = value;
            previewEl.hidden = false;
            const msg = `Loaded in ${elapsedMs} ms (${tester.naturalWidth}x${tester.naturalHeight})`;
            resultEl.textContent = formatImageResult(true, msg);
            resolve({ ok: true, message: msg });
          };

          tester.onerror = () => {
            previewEl.hidden = true;
            previewEl.removeAttribute("src");
            const msg = "Image failed to load (network/auth/hotlink/CORS policy may block it).";
            resultEl.textContent = formatImageResult(false, msg);
            resolve({ ok: false, message: msg });
          };
        });
      }

      async function runImageTests() {
        const originLabel = window.location.origin || "file://";
        setImageStatus(`Testing from ${originLabel} ...`);
        const [r1, r2] = await Promise.all([
          testImage(imageUrl1Input.value, imagePreview1El, imageResult1El),
          testImage(imageUrl2Input.value, imagePreview2El, imageResult2El)
        ]);
        const passed = [r1, r2].filter((item) => item.ok).length;
        setImageStatus(`Done from ${originLabel}: ${passed}/2 passed.`);
      }

      function clearImageResults() {
        imageResult1El.textContent = "Not tested yet.";
        imageResult2El.textContent = "Not tested yet.";
        imagePreview1El.hidden = true;
        imagePreview2El.hidden = true;
        imagePreview1El.removeAttribute("src");
        imagePreview2El.removeAttribute("src");
        setImageStatus("Idle.");
      }

      function setStatus(message) {
        statusLines = [message];
        statusEl.textContent = statusLines.join("\n");
      }

      function addStatus(message) {
        statusLines.push(message);
        if (statusLines.length > STATUS_MAX_LINES) {
          statusLines = statusLines.slice(-STATUS_MAX_LINES);
        }
        statusEl.textContent = statusLines.join("\n");
      }

      function addRaw(message) {
        rawLines.push(message);
        if (rawLines.length > RAW_MAX_LINES) {
          rawLines = rawLines.slice(-RAW_MAX_LINES);
        }
        rawLogEl.textContent = rawLines.join("\n");
      }

      function closeSocket() {
        if (ws && ws.readyState <= WebSocket.OPEN) ws.close();
        ws = null;
      }

      function hexToBytes(hex) {
        if (!/^[0-9a-f]{64}$/i.test(hex)) return null;
        const out = new Uint8Array(32);
        for (let i = 0; i < 32; i += 1) {
          out[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
        }
        return out;
      }

      async function pickAuthMethod() {
        const keyInput = nsecInput.value.trim();
        if (keyInput) {
          if (!keyInput.toLowerCase().startsWith("nsec1")) {
            throw new Error("Private key must be nsec format (nsec1...).");
          }
          const decoded = nip19.decode(keyInput);
          if (decoded.type !== "nsec") {
            throw new Error("Invalid nsec value.");
          }
          if (decoded.data instanceof Uint8Array) {
            secretKey = decoded.data;
          } else if (typeof decoded.data === "string") {
            // Keep compatibility with any decoder variant returning hex.
            secretKey = hexToBytes(decoded.data.toLowerCase());
          } else {
            secretKey = null;
          }
          if (!secretKey || secretKey.length !== 32) throw new Error("Invalid nsec key payload.");
          authPubkey = getPublicKey(secretKey);
          addStatus(`Auth: local key ${authPubkey.slice(0, 8)}...`);
        } else {
          throw new Error("No auth method available: provide nsec.");
        }
      }

      async function sendAuth(challenge, relayUrl) {
        if (!authPubkey) await pickAuthMethod();
        const unsigned = {
          kind: 22242,
          created_at: Math.floor(Date.now() / 1000),
          tags: [
            ["relay", relayUrl],
            ["challenge", challenge]
          ],
          content: "",
          pubkey: authPubkey
        };

        let evt;
        if (secretKey) {
          evt = finalizeEvent(unsigned, secretKey);
        } else {
          throw new Error("Missing nsec for AUTH signing.");
        }
        if (!verifyEvent(evt)) throw new Error("Signed AUTH event failed verification.");
        ws.send(JSON.stringify(["AUTH", evt]));
        addStatus("AUTH sent");
      }

      function renderNote(event) {
        const box = document.createElement("article");
        box.className = "note";
        const date = new Date(event.created_at * 1000).toISOString();
        const plusCode = getPlusCodeFromEvent(event);
        const plusCodeHtml = plusCode
          ? ` | <a href="https://nos.trustroots.org/#${escapeHtml(plusCode)}" target="_blank" rel="noopener noreferrer"><code>${escapeHtml(plusCode)}</code></a>`
          : "";
        box.innerHTML = `
          <div class="meta">
            <code>kind=${event.kind}</code> |
            <code>pubkey=${event.pubkey.slice(0, 16)}...</code> |
            <code>${date}</code>${plusCodeHtml}
          </div>
          <pre>${linkifyTrustrootsUrls(escapeHtml(event.content || ""))}</pre>
        `;
        return box;
      }

      function renderNotesList() {
        notesEl.innerHTML = "";
        const sorted = [...noteEvents].sort((a, b) => {
          const timeDiff = (b.created_at || 0) - (a.created_at || 0);
          if (timeDiff !== 0) return timeDiff;
          return (b.id || "").localeCompare(a.id || "");
        });
        sorted.forEach((event) => {
          if (hiddenKinds.has(event.kind)) return;
          notesEl.appendChild(renderNote(event));
        });
      }

      function renderKindFilters() {
        kindFilterListEl.innerHTML = "";
        const kinds = [...discoveredKinds].sort((a, b) => a - b);
        if (kinds.length === 0) {
          kindFilterListEl.textContent = "No kinds discovered yet.";
          return;
        }
        kinds.forEach((kind) => {
          const label = document.createElement("label");
          label.className = "kind-filter-item";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = !hiddenKinds.has(kind);
          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              hiddenKinds.delete(kind);
            } else {
              hiddenKinds.add(kind);
            }
            renderNotesList();
          });

          const text = document.createElement("code");
          text.textContent = String(kind);
          label.appendChild(checkbox);
          label.appendChild(text);
          kindFilterListEl.appendChild(label);
        });
      }

      function upsertNoteEvent(event) {
        if (!event?.id) return;
        if (typeof event.kind === "number" && !discoveredKinds.has(event.kind)) {
          discoveredKinds.add(event.kind);
          renderKindFilters();
        }
        const idx = noteEvents.findIndex((item) => item.id === event.id);
        if (idx === -1) {
          noteEvents.push(event);
        } else {
          noteEvents[idx] = event;
        }
        renderNotesList();
      }

      function normalizePlusCode(value) {
        if (typeof value !== "string") return null;
        const cleaned = value.trim().toUpperCase();
        return cleaned ? cleaned : null;
      }

      function getPlusCodeFromEvent(event) {
        if (!Array.isArray(event?.tags)) return null;

        // Preferred tags in nr events:
        // ["l", "XXXX0000+", "open-location-code-prefix"]
        // ["l", "XXXX+XX", "open-location-code"]
        for (const tag of event.tags) {
          if (!Array.isArray(tag) || tag.length < 2 || tag[0] !== "l") continue;
          const namespace = typeof tag[2] === "string" ? tag[2] : "";
          if (namespace.startsWith("open-location-code")) {
            return normalizePlusCode(tag[1]);
          }
        }

        // Fallback: some map notes may carry plus code in d-tag.
        const dTag = event.tags.find((tag) => Array.isArray(tag) && tag[0] === "d" && typeof tag[1] === "string");
        if (dTag) {
          return normalizePlusCode(dTag[1]);
        }

        return null;
      }

      function escapeHtml(str) {
        return str.replace(/[&<>"]/g, (ch) => (
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" })[ch]
        ));
      }

      function linkifyTrustrootsUrls(html) {
        return html.replace(
          /https:\/\/(?:www\.)?trustroots\.org\/[^\s<)]+/gi,
          (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
        );
      }

      function subscribeNotes() {
        subId = `notes-${Date.now()}`;
        // No "kinds" or "limit" filter: ask relay for all matching events.
        const filter = {};
        ws.send(JSON.stringify(["REQ", subId, filter]));
        addStatus("REQ notes sent");
      }

      nsecInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          connectBtn.click();
        }
      });

      nsecInput.addEventListener("input", () => {
        localStorage.setItem(nsecStorageKey, nsecInput.value);
      });

      relayUrlInput.addEventListener("input", () => {
        localStorage.setItem(relayUrlStorageKey, relayUrlInput.value);
      });

      imageUrl1Input.addEventListener("input", () => {
        localStorage.setItem(imageUrlStorageKey1, imageUrl1Input.value);
      });

      imageUrl2Input.addEventListener("input", () => {
        localStorage.setItem(imageUrlStorageKey2, imageUrl2Input.value);
      });

      window.addEventListener("load", () => {
        const savedRelayUrl = localStorage.getItem(relayUrlStorageKey);
        if (savedRelayUrl) {
          relayUrlInput.value = savedRelayUrl;
        } else {
          // Fallback to shared relay list used by other nr-web pages (e.g. chat.html).
          const sharedRelayList = localStorage.getItem("relay_urls");
          if (sharedRelayList) {
            const firstRelay = sharedRelayList
              .split(/\r?\n/)
              .map((url) => url.trim())
              .find((url) => url);
            if (firstRelay) relayUrlInput.value = firstRelay;
          }
        }
        const savedNsec = localStorage.getItem(nsecStorageKey);
        if (savedNsec) {
          nsecInput.value = savedNsec;
          // Auto-connect when a saved nsec is available.
          setTimeout(() => {
            connectBtn.click();
          }, 50);
        }
        const savedImageUrl1 = localStorage.getItem(imageUrlStorageKey1);
        if (savedImageUrl1) imageUrl1Input.value = savedImageUrl1;
        const savedImageUrl2 = localStorage.getItem(imageUrlStorageKey2);
        if (savedImageUrl2) imageUrl2Input.value = savedImageUrl2;
        nsecInput.focus();
      });

      relayTabBtn.addEventListener("click", () => showTab("relay"));
      imageTabBtn.addEventListener("click", () => showTab("image"));
      testImageBtn1.addEventListener("click", async () => {
        const originLabel = window.location.origin || "file://";
        setImageStatus(`Testing image 1 from ${originLabel} ...`);
        const result = await testImage(imageUrl1Input.value, imagePreview1El, imageResult1El);
        setImageStatus(`Image 1 ${result.ok ? "passed" : "failed"} from ${originLabel}.`);
      });
      testImageBtn2.addEventListener("click", async () => {
        const originLabel = window.location.origin || "file://";
        setImageStatus(`Testing image 2 from ${originLabel} ...`);
        const result = await testImage(imageUrl2Input.value, imagePreview2El, imageResult2El);
        setImageStatus(`Image 2 ${result.ok ? "passed" : "failed"} from ${originLabel}.`);
      });
      testAllImagesBtn.addEventListener("click", runImageTests);
      clearImageResultsBtn.addEventListener("click", clearImageResults);

      connectBtn.addEventListener("click", async () => {
        notesEl.innerHTML = "";
        noteEvents = [];
        authPubkey = null;
        latestChallenge = null;
        secretKey = null;
        closeSocket();

        const relayUrl = relayUrlInput.value.trim();
        if (!relayUrl.startsWith("ws://") && !relayUrl.startsWith("wss://")) {
          setStatus("Relay URL must start with ws:// or wss://");
          return;
        }

        setStatus(`Connecting to ${relayUrl} ...`);
        rawLines = [];
        rawLogEl.textContent = "";
        ws = new WebSocket(relayUrl);

        ws.addEventListener("open", async () => {
          addStatus("Connected");
          subscribeNotes();
        });

        ws.addEventListener("message", async (msg) => {
          let data;
          try {
            data = JSON.parse(msg.data);
            addRaw(`< ${JSON.stringify(data)}`);
          } catch {
            addStatus(`Non-JSON message: ${String(msg.data)}`);
            addRaw(`< [non-json] ${String(msg.data)}`);
            return;
          }

          const [type, a, b, c] = data;
          if (type === "AUTH") {
            latestChallenge = a;
            addStatus("AUTH challenge received");
            try {
              await sendAuth(latestChallenge, relayUrl);
              // Retry subscription after AUTH, in case first REQ was denied.
              subscribeNotes();
            } catch (err) {
              addStatus(`AUTH failed: ${err.message}`);
            }
            return;
          }

          if (type === "OK") {
            const shortId = a?.slice?.(0, 8) || "-";
            addStatus(`OK ${shortId}: ${b ? "accepted" : "rejected"}${c ? ` (${c})` : ""}`);
            return;
          }

          if (type === "EOSE") {
            addStatus("EOSE");
            return;
          }

          if (type === "NOTICE") {
            addStatus(`NOTICE: ${a}`);
            return;
          }

          if (type === "CLOSED") {
            addStatus(`Subscription closed${b ? ` (${b})` : ""}`);
            return;
          }

          if (type === "EVENT") {
            const event = b;
            if (event && typeof event.kind === "number") upsertNoteEvent(event);
            return;
          }

          addStatus(`Unhandled: ${JSON.stringify(data)}`);
        });

        ws.addEventListener("error", () => addStatus("WebSocket error."));
        ws.addEventListener("close", (ev) => addStatus(`Socket closed (${ev.code}) ${ev.reason || ""}`));
      });

      closeBtn.addEventListener("click", () => {
        closeSocket();
        addStatus("Disconnected by user.");
      });

      kindsAllBtn.addEventListener("click", () => {
        hiddenKinds.clear();
        renderKindFilters();
        renderNotesList();
      });

      kindsNoneBtn.addEventListener("click", () => {
        hiddenKinds.clear();
        discoveredKinds.forEach((kind) => hiddenKinds.add(kind));
        renderKindFilters();
        renderNotesList();
      });
    </script>
  </body>
</html>
