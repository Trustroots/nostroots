appId: org.trustroots.nostroots
---
- openLink: "nostroots://e2e/reset"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- launchApp:
    clearState: true
- tapOn:
    id: "welcome-get-started-button"
- assertVisible: "Your Key Is Your Identity"
- tapOn:
    id: "identity-continue-button"
- assertVisible:
    id: "screen-onboarding-trustroots"
