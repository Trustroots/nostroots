services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile.app
    volumes:
      - ../..:/app:cached
    working_dir: /app
    command: sleep infinity
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/trustroots-dev
      EXPO_USE_METRO_WORKSPACE_ROOT: "1"
      EXPO_NO_DOTENV: "1"

  mongodb:
    build:
      context: .
      dockerfile: Dockerfile.mongodb
    environment:
      MONGO_INITDB_DATABASE: trustroots-dev
    volumes:
      - mongodb-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongodb-data:
