name: nr-app Android Maestro E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "nr-app/**"
      - "nr-bridge/**"
      - "development-utils/local-relay/**"
      - ".github/workflows/nr-app-e2e-maestro.yml"
      - ".devcontainer/**"

concurrency:
  group: nr-app-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: pnpm install

      - name: Build Android E2E APK locally
        working-directory: nr-app
        run: pnpm run build:android-e2e-local

      - name: Start deterministic E2E network
        run: docker compose -f nr-app/e2e/docker-compose.yml up -d --build

      - name: Wait for E2E network
        run: |
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:7777 >/dev/null
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:8025 >/dev/null
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS http://127.0.0.1:8000 >/dev/null

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: |
            adb install -r nr-app/builds/app-e2e-debug.apk
            cd nr-app
            pnpm run test:maestro:local

      - name: Upload Maestro artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-artifacts
          path: |
            ~/.maestro/tests
            nr-app/builds/app-e2e-debug.apk
            nr-app/.e2e-logs/android

      - name: Dump E2E network logs
        if: failure()
        run: docker compose -f nr-app/e2e/docker-compose.yml logs --no-color

      - name: Stop E2E network
        if: always()
        run: docker compose -f nr-app/e2e/docker-compose.yml down -v
