appId: org.trustroots.nostroots
---
- openLink: "nostroots://e2e/reset"
- launchApp:
    clearState: true
- tapOn:
    id: "welcome-get-started-button"
- tapOn:
    id: "identity-skip-button"
- assertVisible:
    id: "screen-map"
- tapOn:
    id: "nav-list"
- assertVisible: "List"
- tapOn:
    id: "nav-settings"
- assertVisible:
    id: "screen-settings"
