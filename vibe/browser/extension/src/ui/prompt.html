<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nostroots Browser Access</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="prompt">
    <main>
      <header class="brand-header compact">
        <img src="nostroots-logo.png" alt="" />
        <div>
          <h1 id="origin">Website</h1>
          <p id="detail" class="muted">This site wants to use Nostroots Browser.</p>
        </div>
      </header>
      <div id="preview" class="request-summary"></div>
      <div class="actions stacked">
        <button id="allow-once" type="button">Allow once</button>
        <button id="always-allow" type="button">Always allow</button>
        <button id="deny" type="button" class="danger">Deny</button>
      </div>
    </main>
    <script src="prompt.js"></script>
  </body>
</html>
