<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nostroots Browser Extension</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup">
    <main>
      <header class="brand-header compact">
        <img src="nostroots-logo.png" alt="" />
        <div>
          <h1>Nostroots Browser Extension</h1>
          <p id="popup-status" class="muted">Checking your key...</p>
        </div>
      </header>
      <code id="popup-npub">Loading...</code>
      <p id="popup-nip05" class="identity-line">Checking Trustroots.org address...</p>
      <p id="popup-build-time" class="build-time">Built --</p>
      <div class="actions">
        <button id="open-options" type="button">Settings</button>
        <button id="open-trustroots" type="button">Nostroots</button>
        <a
          class="icon-link"
          href="https://github.com/Trustroots/nostroots/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open Trustroots/nostroots on GitHub"
          title="Trustroots/nostroots on GitHub"
        >
          <svg aria-hidden="true" viewBox="0 0 16 16" focusable="false">
            <path
              d="M8 0C3.58 0 0 3.67 0 8.2c0 3.62 2.29 6.69 5.47 7.78.4.08.55-.18.55-.4 0-.2-.01-.85-.01-1.55-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.15-.28-.16-.68-.55-.01-.56.63-.01 1.08.59 1.23.84.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.09-1.78-.21-3.64-.91-3.64-4.04 0-.89.31-1.62.82-2.19-.08-.21-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.42 7.42 0 0 1 8 3.96c.68 0 1.36.09 2 .28 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.95.08 2.16.51.57.82 1.3.82 2.19 0 3.14-1.87 3.83-3.65 4.04.29.25.54.75.54 1.53 0 1.1-.01 1.98-.01 2.26 0 .22.15.48.55.4A8.08 8.08 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"
            />
          </svg>
        </a>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
