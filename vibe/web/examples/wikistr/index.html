<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; connect-src 'self' https: wss://relay.guaka.org wss://relay.trustroots.org wss://nip42.trustroots.org; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%232f855a%22/%3E%3Cpath d=%22M15 18h6l5 24 6-24h5l6 24 5-24h6l-8 32h-6l-6-22-6 22h-6z%22 fill=%22white%22/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../../site-chrome.css">
  <title>wikistr</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #08261f;
      --brand-green: #12b591;
      --card-border: #dbe3d2;
      --card-bg: #fffdf4;
      --text-muted: #5f7169;
      --accent: #128a78;
      --accent-dark: #004b3f;
      --accent-soft: #ecf8f1;
      --danger: #b42318;
      --foreground: #08261f;
      --line: var(--card-border);
      --muted: var(--text-muted);
      --white: #fff;
      --shadow-sm: 0 1px 2px rgba(20, 30, 43, 0.04);
      --chrome-width: min(1320px, calc(100% - 32px));
      --chrome-content-width: var(--chrome-width);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(152, 173, 70, 0.18), transparent 360px),
        linear-gradient(90deg, rgba(49, 189, 166, 0.08), rgba(243, 181, 42, 0.08)),
        #f7f8ef;
      color: #08261f;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: var(--chrome-width);
      margin: 0 auto;
      padding: 8px 0 28px;
    }

    .header-title {
      position: relative;
      margin: 0;
      padding: 0.15rem 0.35rem 0.15rem 0.45rem;
      color: var(--white);
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
    }

    .header-title::before {
      content: "★";
      position: absolute;
      left: -0.28rem;
      top: 50%;
      transform: translateY(-50%) rotate(-10deg);
      color: rgba(255, 253, 244, 0.3);
      font-size: 2.15rem;
      line-height: 1;
      text-shadow: none;
      pointer-events: none;
    }

    .header-title span {
      position: relative;
    }

    .header-title a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      margin: 0 0 8px;
      padding: 0;
    }

    .hero-content {
      max-width: 52rem;
    }

    .muted {
      color: var(--text-muted);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .small {
      font-size: 0.9rem;
    }

    .error {
      color: var(--danger);
      font-weight: 650;
    }

    .wiki-switcher button {
      border: 1px solid #b7c2d1;
      background: #fff;
      color: #18212f;
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 650;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .wiki-switcher button:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .wiki-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 0;
      min-height: 36px;
    }

    .wiki-switcher:empty {
      min-height: 0;
    }

    .wiki-switch-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #1f4d33;
    }

    .content-columns {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 12px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 14px;
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      min-width: 0;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    a {
      color: var(--accent);
    }

    .main-page-content {
      width: 100%;
      min-height: 32rem;
      height: 68vh;
      padding: 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: #fff;
      overflow: auto;
      line-height: 1.45;
      font-size: 0.95rem;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .main-page-content img {
      max-width: 100%;
      height: auto;
    }

    .recent-list {
      list-style: none;
      margin: 4px 0 0;
      padding: 0;
    }

    .recent-list li {
      margin: 0;
      padding: 10px 0;
      border-top: 1px solid #eef1f5;
    }

    .recent-list li:first-child {
      border-top: none;
      padding-top: 2px;
    }

    .recent-list li > a {
      font-weight: 700;
      text-decoration: none;
    }

    .recent-list li > a:hover {
      text-decoration: underline;
    }

    .rc-edits {
      list-style: none;
      margin: 5px 0 0;
      padding: 0;
    }

    .rc-edit {
      margin: 0;
      padding: 5px 0;
      border-top: 1px dashed #eef1f5;
    }

    .rc-edit:first-child {
      border-top: 0;
    }

    .rc-section {
      display: inline-block;
      font-size: 0.74rem;
      font-weight: 650;
      line-height: 1.4;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(47, 133, 90, 0.2);
      border-radius: 6px;
      padding: 0 6px;
      margin-right: 5px;
    }

    .rc-comment {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .rc-diff {
      text-decoration: none;
      border-bottom: 1px dashed rgba(47, 133, 90, 0.45);
    }

    @media (max-width: 900px) {
      .shell {
        width: 100%;
        padding: 12px;
      }

      .hero {
        padding: 0;
      }

      .content-columns {
        grid-template-columns: 1fr;
      }

      .main-page-content {
        height: 52vh;
      }
    }

    @media (max-width: 680px) {
      .site-footer {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="header" role="banner">
    <div class="header-inner">
      <nav class="hub-nav" aria-label="Wikistr links">
        <a class="header-brand" href="../../" aria-label="Nostroots home">
          <img src="../../nostroots-logo.png" alt="" width="32" height="32">
        </a>
        <h1 class="header-title"><a href="/examples/wikistr/#trustroots-wiki/Wikistr"><span>Wikistr</span></a></h1>
        <a class="header-app-link" href="https://play.google.com/store/apps/details?id=org.trustroots.nostroots" aria-label="Android">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594zM1.337.924a1.486 1.486 0 0 0-.112.568v21.017c0 .217.045.419.124.6l11.155-11.087L1.337.924zm12.207 10.065l3.258-3.238L3.45.195a1.466 1.466 0 0 0-.946-.179l11.04 10.973zm0 2.067l-11 10.933c.298.036.612-.016.906-.183l13.324-7.54-3.23-3.21z" fill="currentColor"/></svg>
        </a>
        <a class="header-app-link" href="https://apps.apple.com/app/nostroots/id6755037304" aria-label="iOS">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z" fill="currentColor"/></svg>
        </a>
      </nav>
      <section class="identity-status" aria-label="Connection status">
        <button
          id="nostr-key-status"
          class="status-pill status-pill-button"
          type="button"
          data-state="missing"
          aria-haspopup="dialog"
          aria-expanded="false"
        ><strong>no nostr key detected</strong><span class="status-pill-info" aria-hidden="true">i</span></button>
        <a id="trustroots-identity-status" class="status-pill identity-link" data-state="missing" hidden>Trustroots identity: <strong>not linked</strong></a>
      </section>
    </div>
  </header>
  <main class="shell">
    <section class="hero" aria-label="Wikistr">
      <div class="hero-content">
        <div id="wiki-switcher" class="wiki-switcher" role="group" aria-label="Choose wiki"></div>
      </div>
    </section>

    <div class="content-columns">
      <section class="card">
        <div class="card-title" hidden>
          <h2 id="main-page-heading" hidden></h2>
        </div>
        <div id="main-page-content" class="main-page-content" aria-live="polite">
          Discovering public wiki adverts...
        </div>
      </section>

      <section class="card">
        <div class="card-title">
          <h2>Recent changes</h2>
        </div>
        <p id="changes-status" class="muted">Waiting for a wiki advert.</p>
        <ul id="recent-changes" class="recent-list"></ul>
      </section>
    </div>

    <footer class="site-footer" role="contentinfo">
      <div class="site-footer-content">
        <ul class="site-footer-links">
          <li><a href="https://www.trustroots.org/">Trustroots.org</a></li>
          <li><a href="../../">Nostroots</a></li>
          <li><a href="https://www.trustroots.org/support">Support</a></li>
        </ul>
        <div class="site-footer-meta">
          <a
            id="site-footer-build"
            class="site-footer-build"
            href="https://github.com/Trustroots/nostroots"
            aria-label="Nostroots on GitHub"
          >
            <svg class="github-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.36c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
            </svg>
            <span id="build-time" class="site-footer-build-commit">local</span>
          </a>
        </div>
      </div>
    </footer>
  </main>

  <script src="./index.js"></script>
  <script src="../../site-chrome-identity.js"></script>
</body>
</html>
