<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel — Trustroots Circles</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="common.js"></script>
    <style>
        .pixel-page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .pixel-main { display: flex; flex: 1; min-height: 0; }
        .pixel-editor { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; gap: 1rem; min-width: 0; }
        .pixel-feed { width: 320px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--card); display: flex; flex-direction: column; overflow: hidden; }
        .pixel-feed h3 { padding: 0.75rem 1rem; font-size: 1rem; border-bottom: 1px solid var(--border); }
        .pixel-feed-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .pixel-feed-item { padding: 0.5rem; border-radius: var(--radius); margin-bottom: 0.5rem; background: var(--muted); cursor: pointer; }
        .pixel-feed-item:hover { background: var(--secondary); }
        .pixel-feed-preview { width: 64px; height: 64px; image-rendering: pixelated; image-rendering: crisp-edges; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.25rem; }
        .pixel-feed-meta { font-size: 0.75rem; color: var(--muted-foreground); }
        .pixel-feed-meta .location { color: var(--primary); }
        .pixel-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; }
        .pixel-palette { display: flex; gap: 2px; }
        .pixel-swatch { width: 28px; height: 28px; border: 2px solid transparent; border-radius: 4px; cursor: pointer; }
        .pixel-swatch.selected { border-color: var(--foreground); box-shadow: 0 0 0 1px var(--foreground); }
        #pixel-grid-wrap { border: 2px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--muted); }
        #pixel-grid { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair; touch-action: none; }
        .pixel-publish-section { display: flex; flex-direction: column; gap: 0.5rem; max-width: 320px; }
        .pixel-publish-section input[type="text"], .pixel-publish-section select { padding: 0.5rem; border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px); background: var(--input); color: var(--foreground); }
        .pixel-publish-section label { font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; }
        .pixel-status { font-size: 0.875rem; color: var(--muted-foreground); min-height: 1.5em; }
        .pixel-keys-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; }
        .pixel-keys-bar .npub { color: var(--muted-foreground); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: calc(var(--radius) - 2px); background: var(--primary); color: var(--primary-foreground); cursor: pointer; font-family: inherit; font-weight: 500; }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: var(--secondary); color: var(--secondary-foreground); }
        .circle-tabs { display: flex; gap: 2px; }
        .circle-tabs button { padding: 0.35rem 0.75rem; border: 1px solid var(--border); background: var(--muted); color: var(--foreground); border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
        .circle-tabs button.active { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
        .circle-tabs button:hover:not(.active) { background: var(--secondary); }
    </style>
</head>
<body>
    <div class="pixel-page">
        <header class="app-header" id="app-header" data-page-title="Pixel" data-nav-href="index.html" data-nav-title="Map" data-nav-aria-label="Back to map" data-nav-icon="←" data-settings-title="Settings"></header>

        <div class="pixel-main">
            <div class="pixel-editor">
                <div class="circle-tabs" id="circle-tabs"></div>
                <div class="pixel-toolbar">
                    <div class="pixel-palette" id="pixel-palette"></div>
                    <button type="button" class="btn btn-secondary" id="pixel-clear">Clear</button>
                </div>
                <div id="pixel-grid-wrap">
                    <canvas id="pixel-grid" width="256" height="256"></canvas>
                </div>
                <div class="pixel-publish-section">
                    <input type="text" id="pixel-title" placeholder="Title (optional)">
                    <input type="text" id="pixel-where" placeholder="Where (city, place — connects people IRL)">
                    <label><input type="checkbox" id="pixel-is-invite"> This is an invite / jam (meetup)</label>
                    <input type="text" id="pixel-when" placeholder="When (e.g. Thursday 8pm)" style="display:none">
                    <button type="button" class="btn" id="pixel-publish">Publish to circle</button>
                    <div class="pixel-status" id="pixel-status"></div>
                </div>
            </div>
            <aside class="pixel-feed">
                <h3>Feed</h3>
                <div class="pixel-feed-list" id="pixel-feed-list"></div>
            </aside>
        </div>
    </div>

    <script type="module">
        const PIXEL_KIND = 1923;
        const DEFAULT_RELAYS = ['wss://relay.trustroots.org', 'wss://relay.nomadwiki.org'];
        const GRID_SIZE = 16;
        const CELL_PX = 16;
        const DEFAULT_PALETTE = [
            '#1a1a2e', '#16213e', '#0f3460', '#e94560', '#533483', '#c4b6b6', '#f5e6e8', '#ffc93c', '#ffffff'
        ];

        const PIXEL_CIRCLES = [
            { slug: 'artists', title: 'Artists' },
            { slug: 'burners', title: 'Burners' },
            { slug: 'punks', title: 'Punks' }
        ];

        let currentCircle = 'artists';
        let selectedColorIndex = 8;
        let grid = [];
        let currentPrivateKeyBytes = null;
        let currentPublicKey = null;
        let feedEvents = [];
        let activeFeedConnections = [];
        let feedSubscriptionToken = 0;

        function getCircleFromUrl() {
            const params = new URLSearchParams(location.search);
            const c = params.get('circle');
            if (PIXEL_CIRCLES.some(x => x.slug === c)) return c;
            return 'artists';
        }

        function getRelayUrls() {
            try {
                const saved = localStorage.getItem('relay_urls');
                if (saved) return saved.split('\n').filter(u => u.trim());
            } catch (_) {}
            return DEFAULT_RELAYS;
        }

        function initGrid() {
            grid = Array(GRID_SIZE * GRID_SIZE).fill(0);
            drawGrid();
        }

        function drawGrid() {
            const canvas = document.getElementById('pixel-grid');
            const ctx = canvas.getContext('2d');
            const palette = DEFAULT_PALETTE;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const i = y * GRID_SIZE + x;
                    ctx.fillStyle = palette[grid[i]] || palette[0];
                    ctx.fillRect(x * CELL_PX, y * CELL_PX, CELL_PX, CELL_PX);
                }
            }
            updateFavicon();
        }
        function updateFavicon() {
            const size = 32;
            const fav = document.createElement('canvas');
            fav.width = size;
            fav.height = size;
            const ctx = fav.getContext('2d');
            const palette = DEFAULT_PALETTE;
            const cs = size / GRID_SIZE;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const i = y * GRID_SIZE + x;
                    ctx.fillStyle = palette[grid[i]] || palette[0];
                    ctx.fillRect(x * cs, y * cs, Math.ceil(cs) + 1, Math.ceil(cs) + 1);
                }
            }
            let link = document.querySelector('link[rel="icon"]');
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
            }
            link.href = fav.toDataURL('image/png');
        }

        function renderToCanvas(ctx, data, maxSize) {
            const palette = data.palette && data.palette.length ? data.palette : DEFAULT_PALETTE;
            const g = data.grid || [];
            const width = data.w || GRID_SIZE;
            const height = data.h || GRID_SIZE;
            const size = maxSize || 64;
            const cs = size / Math.max(width, height, 1);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = y * width + x;
                    const idx = g[i] !== undefined ? g[i] : 0;
                    ctx.fillStyle = palette[idx] || palette[0];
                    ctx.fillRect(x * cs, y * cs, Math.ceil(cs) + 1, Math.ceil(cs) + 1);
                }
            }
        }

        function cellFromEvent(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / rect.width * GRID_SIZE);
            const y = Math.floor((e.clientY - rect.top) / rect.height * GRID_SIZE);
            return { x, y };
        }
        function setCell(x, y) {
            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE)
                grid[y * GRID_SIZE + x] = selectedColorIndex;
        }
        function drawAtCell(x, y) {
            setCell(x, y);
            drawGrid();
        }
        function drawLine(x0, y0, x1, y1) {
            const dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            const dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = dx + dy;
            while (true) {
                setCell(x0, y0);
                if (x0 === x1 && y0 === y1) break;
                const e2 = 2 * err;
                if (e2 >= dy) { err += dy; x0 += sx; }
                if (e2 <= dx) { err += dx; y0 += sy; }
            }
            drawGrid();
        }
        let isDrawing = false;
        let lastCell = null;
        const canvasEl = document.getElementById('pixel-grid');
        canvasEl.addEventListener('pointerdown', (e) => {
            if (e.button !== undefined && e.button !== 0) return;
            e.preventDefault();
            canvasEl.setPointerCapture?.(e.pointerId);
            isDrawing = true;
            const { x, y } = cellFromEvent(canvasEl, e);
            lastCell = { x, y };
            drawAtCell(x, y);
        });
        canvasEl.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const { x, y } = cellFromEvent(canvasEl, e);
            if (lastCell !== null && (lastCell.x !== x || lastCell.y !== y)) {
                drawLine(lastCell.x, lastCell.y, x, y);
                lastCell = { x, y };
            }
        });
        function stopDrawing(e) {
            if (e?.pointerId !== undefined) canvasEl.releasePointerCapture?.(e.pointerId);
            isDrawing = false;
            lastCell = null;
        }
        canvasEl.addEventListener('pointerup', stopDrawing);
        canvasEl.addEventListener('pointercancel', stopDrawing);
        canvasEl.addEventListener('lostpointercapture', stopDrawing);

        document.getElementById('pixel-clear').addEventListener('click', () => { initGrid(); });

        function buildPalette() {
            const el = document.getElementById('pixel-palette');
            el.innerHTML = '';
            DEFAULT_PALETTE.forEach((hex, i) => {
                const sw = document.createElement('button');
                sw.type = 'button';
                sw.className = 'pixel-swatch' + (i === selectedColorIndex ? ' selected' : '');
                sw.style.background = hex;
                sw.title = i;
                sw.addEventListener('click', () => {
                    selectedColorIndex = i;
                    document.querySelectorAll('.pixel-swatch').forEach((s, j) => s.classList.toggle('selected', j === i));
                });
                el.appendChild(sw);
            });
        }

        function buildCircleTabs() {
            currentCircle = getCircleFromUrl();
            const el = document.getElementById('circle-tabs');
            el.innerHTML = '';
            PIXEL_CIRCLES.forEach(({ slug, title }) => {
                const b = document.createElement('button');
                b.textContent = title;
                b.classList.toggle('active', slug === currentCircle);
                b.addEventListener('click', () => {
                    currentCircle = slug;
                    window.history.replaceState({}, '', '?circle=' + slug);
                    document.querySelectorAll('.circle-tabs button').forEach((btn, i) => btn.classList.toggle('active', PIXEL_CIRCLES[i].slug === slug));
                    subscribeFeed();
                });
                el.appendChild(b);
            });
        }

        document.getElementById('pixel-is-invite').addEventListener('change', (e) => {
            document.getElementById('pixel-when').style.display = e.target.checked ? 'block' : 'none';
        });

        async function loadNostr() {
            const { finalizeEvent, getPublicKey, nip19 } = await import('https://cdn.jsdelivr.net/npm/nostr-tools@2.10.3/+esm');
            const { Relay } = await import('https://cdn.jsdelivr.net/npm/nostr-tools@2.10.3/+esm');
            return { finalizeEvent, getPublicKey, nip19, Relay };
        }
        async function ensureNostr() {
            if (!nostrTools) nostrTools = await loadNostr();
            getPublicKey = nostrTools.getPublicKey;
            return nostrTools;
        }

        function loadKeys() {
            try {
                const hex = localStorage.getItem('nostr_private_key');
                if (hex && hex.length === 64 && /^[0-9a-f]+$/i.test(hex)) {
                    const bytes = new Uint8Array(32);
                    for (let i = 0; i < 32; i++) bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
                    currentPrivateKeyBytes = bytes;
                    currentPublicKey = getPublicKey(bytes);
                    return true;
                }
            } catch (_) {}
            currentPrivateKeyBytes = null;
            currentPublicKey = null;
            return false;
        }

        let nostrTools = null;
        let getPublicKey = null;

        async function initKeys() {
            await ensureNostr();
            const has = loadKeys();
            updateKeyDisplay();
            return has;
        }

        async function savePrivateKey(hex) {
            localStorage.setItem('nostr_private_key', hex);
            await ensureNostr();
            loadKeys();
            updateKeyDisplay();
        }

        async function importPrivateKey(raw) {
            const input = (raw || '').trim();
            if (!input) { setStatus('Paste an nsec or hex key.', 'error'); return false; }
            await ensureNostr();
            try {
                let hex = null;
                if (input.length === 64 && /^[0-9a-f]+$/i.test(input)) {
                    hex = input;
                } else if (input.startsWith('nsec1')) {
                    const decoded = nostrTools.nip19.decode(input);
                    if (decoded.type === 'nsec') hex = Array.from(decoded.data).map(b => b.toString(16).padStart(2, '0')).join('');
                }
                if (!hex) { setStatus('Invalid nsec or hex key.', 'error'); return false; }
                await savePrivateKey(hex);
                setStatus('Key imported.', 'success');
                return true;
            } catch (e) { setStatus('Invalid key: ' + (e.message || e), 'error'); return false; }
        }

        async function generateKeyPair() {
            await ensureNostr();
            const bytes = new Uint8Array(32);
            crypto.getRandomValues(bytes);
            const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
            await savePrivateKey(hex);
            setStatus('New key generated.', 'success');
            openKeysModal();
        }

        function setStatus(msg, type) {
            const el = document.getElementById('pixel-status');
            el.textContent = msg || '';
            el.style.color = type === 'error' ? 'var(--destructive)' : type === 'success' ? 'var(--primary)' : 'var(--muted-foreground)';
        }

        const seenIds = new Set();
        function closeFeedSubscriptions() {
            activeFeedConnections.forEach(({ relay, sub }) => {
                try { sub?.close?.(); } catch (_) {}
                try { relay?.close?.(); } catch (_) {}
            });
            activeFeedConnections = [];
        }

        function subscribeFeed() {
            if (!nostrTools) return;
            const { Relay } = nostrTools;
            const urls = getRelayUrls();
            closeFeedSubscriptions();
            const token = ++feedSubscriptionToken;
            feedEvents = [];
            seenIds.clear();
            renderFeed();
            const filter = { kinds: [PIXEL_KIND], '#L': ['trustroots-circle'], '#l': [currentCircle] };
            urls.forEach(url => {
                Relay.connect(url).then(relay => {
                    if (token !== feedSubscriptionToken) {
                        relay.close();
                        return;
                    }
                    const sub = relay.subscribe([filter], {
                        onevent: (event) => {
                            if (token !== feedSubscriptionToken) return;
                            if (seenIds.has(event.id)) return;
                            seenIds.add(event.id);
                            try {
                                const c = JSON.parse(event.content || '{}');
                                if (c.v && c.grid) {
                                    feedEvents.unshift({ ...event, parsed: c });
                                    feedEvents = feedEvents.slice(0, 100);
                                    renderFeed();
                                }
                            } catch (_) {}
                        }
                    });
                    activeFeedConnections.push({ relay, sub });
                }).catch(() => {});
            });
        }

        function renderFeed() {
            const list = document.getElementById('pixel-feed-list');
            list.innerHTML = '';
            feedEvents.forEach(ev => {
                const item = document.createElement('div');
                item.className = 'pixel-feed-item';
                const preview = document.createElement('canvas');
                preview.width = 64;
                preview.height = 64;
                preview.className = 'pixel-feed-preview';
                const ctx = preview.getContext('2d');
                renderToCanvas(ctx, ev.parsed, 64);
                const meta = document.createElement('div');
                meta.className = 'pixel-feed-meta';
                const title = ev.parsed.title || 'Untitled';
                let loc = ev.parsed.location ? `📍 ${ev.parsed.location}` : '';
                if (ev.parsed.type === 'invite' || ev.parsed.type === 'jam') loc += (loc ? ' · ' : '') + 'Meetup';
                meta.innerHTML = `<strong>${escapeHtml(title)}</strong><br>${loc ? `<span class="location">${escapeHtml(loc)}</span>` : ''}`;
                item.appendChild(preview);
                item.appendChild(meta);
                item.addEventListener('click', () => {
                    grid = (ev.parsed.grid || []).slice();
                    while (grid.length < GRID_SIZE * GRID_SIZE) grid.push(0);
                    grid = grid.slice(0, GRID_SIZE * GRID_SIZE);
                    drawGrid();
                });
                list.appendChild(item);
            });
            if (feedEvents.length === 0) list.innerHTML = '<p style="color: var(--muted-foreground); font-size: 0.875rem;">No pieces in this circle yet. Publish one!</p>';
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.getElementById('pixel-publish').addEventListener('click', async () => {
            if (!currentPrivateKeyBytes || !currentPublicKey) {
                setStatus('Import or generate a key first (Keys button).', 'error');
                return;
            }
            const { finalizeEvent, Relay } = await ensureNostr();
            const title = document.getElementById('pixel-title').value.trim() || undefined;
            const where = document.getElementById('pixel-where').value.trim() || undefined;
            const isInvite = document.getElementById('pixel-is-invite').checked;
            const when = document.getElementById('pixel-when').value.trim() || undefined;
            const content = {
                v: 1,
                title,
                palette: DEFAULT_PALETTE,
                grid: grid.slice(),
                w: GRID_SIZE,
                h: GRID_SIZE,
                location: where,
                type: isInvite ? (when ? 'invite' : 'jam') : 'art',
                when: isInvite ? when : undefined
            };
            const tags = [
                ['L', 'trustroots-circle'],
                ['l', currentCircle, 'trustroots-circle']
            ];
            if (where) tags.push(['location', where]);
            if (content.type !== 'art') tags.push(['type', content.type]);
            const event = {
                kind: PIXEL_KIND,
                content: JSON.stringify(content),
                created_at: Math.floor(Date.now() / 1000),
                pubkey: currentPublicKey,
                tags
            };
            const signed = finalizeEvent(event, currentPrivateKeyBytes);
            const urls = getRelayUrls();
            setStatus('Publishing…', 'info');
            let ok = 0;
            for (const url of urls) {
                try {
                    const relay = await Relay.connect(url);
                    await relay.publish(signed);
                    relay.close();
                    ok++;
                } catch (_) {}
            }
            if (ok > 0) {
                seenIds.add(signed.id);
                feedEvents.unshift({ ...signed, parsed: content });
                renderFeed();
                setStatus(`Published to ${ok} relay(s).`, 'success');
            } else setStatus('Publish failed. Check relays on Map settings.', 'error');
        });

        function renderRelaysList() {
            const list = document.getElementById('relays-list');
            if (!list) return;
            const urls = getRelayUrls();
            list.innerHTML = '';
            urls.forEach((url) => {
                const item = document.createElement('div');
                item.className = 'relay-item';
                item.innerHTML = `<span>${escapeHtml(url)}</span><button type="button" class="btn btn-secondary" data-relay-url="${escapeHtml(url)}">Remove</button>`;
                item.querySelector('button').addEventListener('click', () => removeRelay(url));
                list.appendChild(item);
            });
        }

        function saveRelayUrls(urls) {
            const cleaned = [...new Set(urls.map(u => u.trim()).filter(Boolean))];
            if (cleaned.length) localStorage.setItem('relay_urls', cleaned.join('\n'));
            else localStorage.removeItem('relay_urls');
            subscribeFeed();
            renderRelaysList();
        }

        function addRelay() {
            const input = document.getElementById('new-relay-url');
            const url = input?.value?.trim();
            if (!url) return;
            if (!/^wss:\/\/.+/i.test(url)) {
                setStatus('Relay URL must start with wss://', 'error');
                return;
            }
            saveRelayUrls([...getRelayUrls(), url]);
            if (input) input.value = '';
            setStatus('Relay added.', 'success');
        }

        function removeRelay(url) {
            saveRelayUrls(getRelayUrls().filter(u => u !== url));
            setStatus('Relay removed.', 'success');
        }

        function setHeaderIdentity() {
            const el = document.getElementById('header-identity');
            if (!el) return;
            if (!currentPublicKey || !nostrTools) {
                el.textContent = '';
                el.title = '';
                el.classList.add('empty');
                return;
            }
            try {
                const npub = nostrTools.nip19.npubEncode(currentPublicKey);
                el.textContent = npub.slice(0, 12) + '…' + npub.slice(-8);
                el.title = npub;
                el.classList.remove('empty');
            } catch (_) {
                el.textContent = 'Key loaded';
                el.title = currentPublicKey;
                el.classList.remove('empty');
            }
        }

        function updateKeyDisplay() {
            const hasKey = !!currentPublicKey;
            const welcomeSection = document.getElementById('keys-welcome-section');
            const importSection = document.getElementById('keys-import-section');
            const generateSection = document.getElementById('keys-generate-section');
            const manageSection = document.getElementById('keys-manage-section');
            const trustrootsSection = document.getElementById('keys-trustroots-section');
            const nsecActionsGroup = document.getElementById('nsec-actions-group');
            const noNsecActionsGroup = document.getElementById('no-nsec-actions-group');
            const generateKeyGroup = document.getElementById('generate-key-group');
            const updateTrustrootsGroup = document.getElementById('update-trustroots-profile-group');
            const npubDisplayGroup = document.getElementById('npub-display-group');
            const keySectionDivider = document.getElementById('key-section-divider');
            const npubDisplay = document.getElementById('npub-display');

            if (welcomeSection) welcomeSection.style.display = hasKey ? 'none' : 'block';
            if (importSection) importSection.style.display = hasKey ? 'none' : 'block';
            if (generateSection) generateSection.style.display = hasKey ? 'none' : 'block';
            if (manageSection) manageSection.style.display = hasKey ? 'block' : 'none';
            if (trustrootsSection) trustrootsSection.style.display = 'none';
            if (nsecActionsGroup) nsecActionsGroup.style.display = hasKey ? 'block' : 'none';
            if (noNsecActionsGroup) noNsecActionsGroup.style.display = hasKey ? 'none' : 'block';
            if (generateKeyGroup) generateKeyGroup.style.display = hasKey ? 'none' : 'block';
            if (updateTrustrootsGroup) updateTrustrootsGroup.style.display = 'none';
            if (npubDisplayGroup) npubDisplayGroup.style.display = hasKey ? 'block' : 'none';
            if (keySectionDivider) keySectionDivider.style.display = hasKey ? 'block' : 'none';
            if (npubDisplay && hasKey && nostrTools) npubDisplay.value = nostrTools.nip19.npubEncode(currentPublicKey);
            if (npubDisplay && !hasKey) npubDisplay.value = '';
            setHeaderIdentity();
        }

        function openKeysModal() {
            const keysEl = document.getElementById('keys-modal');
            const settingsEl = document.getElementById('settings-modal');
            if (settingsEl) settingsEl.classList.remove('active');
            updateKeyDisplay();
            if (keysEl) keysEl.classList.add('active');
        }

        function closeKeysModal() {
            document.getElementById('keys-modal')?.classList.remove('active');
        }

        function openSettingsModal() {
            const keysEl = document.getElementById('keys-modal');
            const settingsEl = document.getElementById('settings-modal');
            if (keysEl) keysEl.classList.remove('active');
            renderRelaysList();
            if (settingsEl) settingsEl.classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal')?.classList.remove('active');
        }

        async function onboardingImport() {
            const input = document.getElementById('onboarding-import');
            if (await importPrivateKey(input?.value || '')) {
                if (input) input.value = '';
                openKeysModal();
            }
        }

        async function importNsec() {
            const input = document.getElementById('nsec-import');
            if (await importPrivateKey(input?.value || '')) {
                if (input) input.value = '';
                openKeysModal();
            }
        }

        function onboardingGenerate() {
            generateKeyPair();
        }

        function deleteNsec() {
            if (!confirm('Delete your private key? You will need to import or generate a new key.')) return;
            localStorage.removeItem('nostr_private_key');
            currentPrivateKeyBytes = null;
            currentPublicKey = null;
            updateKeyDisplay();
            setStatus('Private key deleted.', 'success');
            openKeysModal();
        }

        function exportNsec() {
            if (!currentPrivateKeyBytes || !nostrTools) {
                setStatus('No private key to export.', 'error');
                return;
            }
            try {
                const nsec = nostrTools.nip19.nsecEncode(currentPrivateKeyBytes);
                navigator.clipboard.writeText(nsec).then(() => setStatus('nsec copied to clipboard.', 'success')).catch(() => {
                    prompt('Your nsec (copy this):', nsec);
                    setStatus('nsec displayed.', 'info');
                });
            } catch (e) {
                setStatus('Error exporting nsec: ' + (e.message || e), 'error');
            }
        }

        function copyPublicKey() {
            const value = document.getElementById('npub-display')?.value;
            if (!value) {
                setStatus('No public key to copy.', 'error');
                return;
            }
            navigator.clipboard.writeText(value).then(() => setStatus('npub copied to clipboard.', 'success')).catch(() => setStatus('Could not copy npub.', 'error'));
        }

        function updateTrustrootsProfile() {}
        function linkTrustrootsProfile() {}

        function attachSharedHeaderButtons() {
            const header = document.getElementById('app-header');
            if (!header) return;
            header.addEventListener('click', function (e) {
                if (e.target.closest('#keys-icon-btn')) {
                    e.preventDefault();
                    openKeysModal();
                } else if (e.target.closest('#settings-icon-btn')) {
                    e.preventDefault();
                    openSettingsModal();
                }
            });
        }

        Object.assign(window, {
            addRelay,
            removeRelay,
            openKeysModal,
            closeKeysModal,
            openSettingsModal,
            closeSettingsModal,
            onboardingImport,
            onboardingGenerate,
            importNsec,
            generateKeyPair,
            exportNsec,
            deleteNsec,
            copyPublicKey,
            updateTrustrootsProfile,
            linkTrustrootsProfile
        });

        document.addEventListener('nostroots-modals-injected', () => {
            updateKeyDisplay();
            renderRelaysList();
        });
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', attachSharedHeaderButtons);
        } else {
            attachSharedHeaderButtons();
        }

        (async () => {
            buildPalette();
            buildCircleTabs();
            initGrid();
            await initKeys();
            subscribeFeed();
        })();
    </script>
</body>
</html>
