<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostroots Web moved</title>
  <meta name="description" content="The Nostroots map is now part of Nostroots Web.">
  <meta name="theme-color" content="#12a585">
  <link rel="canonical" href="https://nos.trustroots.org/web/#map">
  <meta http-equiv="refresh" content="0; url=../web/#map">
  <script>
    (function () {
      var target = new URL('../web/', window.location.href);
      target.search = window.location.search;
      target.hash = 'map';
      window.location.replace(target.href);
    })();
  </script>
</head>
<body>
  <main>
    <h1>Nostroots Map moved</h1>
    <p>The map is now part of Nostroots Web.</p>
    <p><a href="../web/#map">Open the map in Nostroots Web</a>.</p>
  </main>
</body>
</html>
