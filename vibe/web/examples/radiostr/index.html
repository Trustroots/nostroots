<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; media-src 'self' https:; connect-src 'self' https: wss://relay.trustroots.org wss://relay.nomadwiki.org wss://nip42.trustroots.org; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%23128a78%22/%3E%3Ccircle cx=%2232%22 cy=%2232%22 r=%2214%22 fill=%22none%22 stroke=%22white%22 stroke-width=%224%22/%3E%3Ccircle cx=%2232%22 cy=%2232%22 r=%226%22 fill=%22white%22/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../../site-chrome.css">
  <title>Radiostr</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #08261f;
      --brand-green: #12b591;
      --card-border: #dbe3d2;
      --card-bg: #fffdf4;
      --text-muted: #5f7169;
      --accent: #128a78;
      --accent-dark: #004b3f;
      --accent-soft: #ecf8f1;
      --danger: #b42318;
      --white: #fff;
      --shadow-sm: 0 1px 2px rgba(20, 30, 43, 0.04);
      --page-gutter: clamp(14px, 2vw, 24px);
      --chrome-width: 100%;
      --chrome-content-width: 100%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(18, 138, 120, 0.14), transparent 320px),
        linear-gradient(90deg, rgba(49, 189, 166, 0.08), rgba(243, 181, 42, 0.06)),
        #f7f8ef;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: var(--chrome-width);
      max-width: none;
      margin: 0;
      padding: 10px var(--page-gutter) 28px;
    }

    .header .header-inner {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 9px var(--page-gutter);
    }

    .header .hub-nav {
      flex: 1 1 auto;
      min-width: 0;
    }

    .header .identity-status {
      max-width: none;
      flex: 0 1 auto;
    }

    .header-title {
      margin: 0;
      padding: 0.15rem 0.35rem;
      color: var(--white);
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
    }

    .header-title a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: clamp(12px, 1.6vw, 18px);
      align-items: start;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 14px;
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .muted { color: var(--text-muted); }

    .now-playing {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin: -2px -2px 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(18, 138, 120, 0.1), rgba(255, 253, 244, 0.95) 48%, rgba(243, 181, 42, 0.08)),
        var(--card-bg);
      border: 1px solid rgba(18, 138, 120, 0.18);
      box-shadow: 0 8px 24px rgba(18, 75, 63, 0.07);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .now-playing.is-playing {
      border-color: rgba(18, 138, 120, 0.35);
      box-shadow:
        0 8px 28px rgba(18, 138, 120, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .now-playing-art-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    .now-playing img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      background: #e8efe4;
      box-shadow: 0 4px 14px rgba(8, 38, 31, 0.14);
      display: block;
    }

    .now-playing img[hidden] {
      display: none;
    }

    .now-playing-art-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.55), transparent 55%),
        linear-gradient(145deg, #1a9a86, #0d5f52 58%, #084b3f);
      box-shadow: 0 4px 14px rgba(8, 38, 31, 0.18);
      color: rgba(255, 255, 255, 0.92);
    }

    .now-playing-art-placeholder svg {
      width: 34px;
      height: 34px;
      fill: currentColor;
      opacity: 0.95;
    }

    .now-playing.has-art .now-playing-art-placeholder {
      display: none;
    }

    .now-playing-meta {
      min-width: 0;
    }

    .now-playing-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 0 0 5px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c5cec8;
      flex-shrink: 0;
    }

    .now-playing.is-playing .live-dot {
      background: var(--brand-green);
      box-shadow: 0 0 0 3px rgba(18, 181, 145, 0.22);
      animation: radiostr-pulse 1.8s ease-in-out infinite;
    }

    @keyframes radiostr-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.75; }
    }

    .now-playing h2 {
      margin: 0;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--accent-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-playing.is-idle h2 {
      color: var(--text-muted);
      font-weight: 700;
    }

    .now-playing-subtitle {
      margin: 4px 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
    }

    .controls button,
    .tune-btn,
    .station-play,
    .station-star,
    #star-btn {
      border: 1px solid #b7c2d1;
      background: #fff;
      color: #18212f;
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 650;
    }

    .controls button:hover,
    .tune-btn:hover,
    .station-play:hover,
    .station-star:hover,
    #star-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .station-row-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .station-row-main:hover .station-name,
    .station-row-main:focus-visible .station-name {
      color: var(--accent);
    }

    .station-row-main:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 8px;
    }

    #play-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: linear-gradient(160deg, #18a892, #0d6b5c);
      color: #fff;
      box-shadow:
        0 4px 14px rgba(13, 107, 92, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #play-btn:hover {
      transform: scale(1.04);
      box-shadow:
        0 6px 18px rgba(13, 107, 92, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      background: linear-gradient(160deg, #1cb39c, #0f7565);
    }

    #play-btn:active {
      transform: scale(0.97);
    }

    #play-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    #play-btn .play-icon {
      margin-left: 3px;
    }

    #play-btn .pause-icon {
      display: none;
    }

    #play-btn[aria-pressed="true"] .play-icon {
      display: none;
    }

    #play-btn[aria-pressed="true"] .pause-icon {
      display: block;
    }

    #star-btn {
      min-width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-size: 1.2rem;
      line-height: 1;
      color: #c58a00;
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(18, 138, 120, 0.2);
    }

    #star-btn[aria-pressed="true"] {
      color: #e6a100;
      background: rgba(255, 236, 179, 0.55);
      border-color: #e6a100;
    }

    .station-section + .station-section {
      margin-top: 16px;
    }

    .station-section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .station-section h3 {
      margin: 0;
      font-size: 0.82rem;
      color: var(--accent-dark);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
    }

    .station-section-count {
      font-size: 0.76rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .station-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .station-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.72);
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .station-row:hover {
      border-color: rgba(18, 138, 120, 0.28);
      background: #fff;
    }

    .station-row.is-active {
      border-color: rgba(18, 138, 120, 0.45);
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .station-play {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 50%;
      color: var(--accent-dark);
    }

    .station-play svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .station-play .play-glyph {
      margin-left: 2px;
    }

    .station-art {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      background: #e8efe4;
      flex: 0 0 auto;
    }

    .station-info {
      min-width: 0;
      flex: 1 1 auto;
    }

    .station-name {
      display: block;
      font-size: 0.92rem;
      font-weight: 750;
      line-height: 1.25;
      color: var(--accent-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-tags {
      display: block;
      margin-top: 2px;
      font-size: 0.76rem;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-star {
      flex: 0 0 auto;
      min-height: 34px;
      width: 34px;
      padding: 0;
      border-radius: 50%;
      font-size: 1rem;
      line-height: 1;
      color: #c58a00;
      background: rgba(255, 255, 255, 0.85);
    }

    .station-star[aria-pressed="true"] {
      color: #e6a100;
      background: rgba(255, 236, 179, 0.55);
      border-color: #e6a100;
    }

    .station-live {
      flex: 0 0 auto;
      font-size: 0.64rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #c62828;
      border: 1px solid rgba(198, 40, 40, 0.4);
      border-radius: 999px;
      padding: 3px 8px;
      line-height: 1;
    }

    .station-live[hidden] {
      display: none;
    }

    .listener-list,
    .chat-log {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 220px;
      overflow: auto;
    }

    .listener-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid #eef1f5;
    }

    .listener-item:first-child { border-top: none; }

    .listener-art-link,
    .listener-art-wrap {
      flex: 0 0 auto;
      line-height: 0;
    }

    .listener-art-link {
      text-decoration: none;
    }

    .listener-body {
      min-width: 0;
      flex: 1 1 auto;
    }

    .listener-name {
      display: block;
      font-weight: 700;
    }

    .listener-name a {
      color: inherit;
      text-decoration: none;
    }

    .listener-name a:hover {
      text-decoration: underline;
    }

    .listener-station {
      display: block;
      margin-top: 2px;
    }

    .listener-station a {
      color: var(--accent-dark);
      font-weight: 650;
      text-decoration: none;
    }

    .listener-station a:hover {
      text-decoration: underline;
    }

    .listener-time {
      display: block;
      margin-top: 2px;
      font-size: 0.82rem;
    }

    .chat-log {
      max-height: 280px;
      margin-bottom: 10px;
    }

    .chat-row {
      padding: 8px 0;
      border-top: 1px solid #eef1f5;
    }

    .chat-row:first-child { border-top: none; }

    .chat-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 2px;
      font-size: 0.82rem;
    }

    .chat-user { font-weight: 700; }

    .channel-badge {
      border: 1px solid rgba(18, 138, 120, 0.35);
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    .chat-body {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .chat-form {
      display: flex;
      gap: 8px;
    }

    .chat-form input {
      flex: 1;
      min-height: 38px;
      border: 1px solid #b7c2d1;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }

    .social-stack > .card + .card {
      margin-top: 12px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .now-playing {
        grid-template-columns: 64px minmax(0, 1fr) auto;
        gap: 10px;
        padding: 12px;
      }
      .now-playing-art-wrap,
      .now-playing img,
      .now-playing-art-placeholder {
        width: 64px;
        height: 64px;
      }
      #play-btn {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <header class="header" role="banner">
    <div class="header-inner">
      <nav class="hub-nav" aria-label="Radiostr links">
        <a class="header-brand" href="../../" target="_blank" rel="noopener noreferrer" aria-label="Nostroots home">
          <img src="../../nostroots-logo67.png" alt="" width="46" height="46">
        </a>
        <a class="header-app-link" href="https://play.google.com/store/apps/details?id=org.trustroots.nostroots" target="_blank" rel="noopener noreferrer" aria-label="Android">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.6 9.48 19.44 6.3c.16-.31-.04-.68-.38-.68-.15 0-.29.08-.37.21l-1.87 3.24c-1.28-.58-2.72-.9-4.22-.9s-2.94.32-4.22.9L6.46 5.83c-.08-.13-.22-.21-.37-.21-.34 0-.54.37-.38.68l1.84 3.18C4.54 11.09 3 13.64 3 16.62h18c0-2.98-1.54-5.53-3.4-7.14ZM8.5 15.12c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1Zm7 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1Z" fill="currentColor"/></svg>
        </a>
        <a class="header-app-link" href="https://apps.apple.com/app/nostroots/id6755037304" target="_blank" rel="noopener noreferrer" aria-label="iOS">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z" fill="currentColor"/></svg>
        </a>
        <h1 class="header-title"><a href="/examples/radiostr/"><span>Radiostr</span></a></h1>
      </nav>
      <section class="identity-status" aria-label="Connection status">
        <button
          id="nostr-key-status"
          class="status-pill status-pill-button"
          type="button"
          data-state="missing"
          aria-haspopup="dialog"
          aria-expanded="false"
        ><strong>no nostr key detected</strong><span class="status-pill-info" aria-hidden="true">i</span></button>
        <a id="trustroots-identity-status" class="status-pill identity-link" data-state="missing" hidden>Trustroots identity: <strong>not linked</strong></a>
      </section>
    </div>
  </header>

  <main class="shell">
    <div class="layout">
      <section class="card" aria-label="Radio player">
        <div class="now-playing is-idle" id="now-playing-bar">
          <div class="now-playing-art-wrap">
            <img id="now-playing-art" src="" alt="" hidden>
            <div class="now-playing-art-placeholder" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 2c1.66 0 3.2.52 4.46 1.4L7.4 15.46A6.96 6.96 0 0 1 5 12c0-3.87 3.13-7 7-7zm0 14a6.96 6.96 0 0 1-4.46-1.6l9.06-9.06A6.96 6.96 0 0 1 19 12c0 3.87-3.13 7-7 7z"/></svg>
            </div>
          </div>
          <div class="now-playing-meta">
            <p class="now-playing-label">
              <span class="live-dot" aria-hidden="true"></span>
              <span id="now-playing-label-text">Ready to listen</span>
            </p>
            <h2 id="now-playing-title">Pick a station</h2>
            <p id="now-playing-subtitle" class="now-playing-subtitle muted small" hidden></p>
          </div>
          <div class="controls">
            <button id="star-btn" type="button" aria-pressed="false" aria-label="Star this station" hidden>☆</button>
            <button id="play-btn" type="button" aria-pressed="false" aria-label="Play">
              <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
              <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
            </button>
          </div>
        </div>
        <div id="station-sections" style="margin-top:14px;"></div>
      </section>

      <div class="social-stack">
        <section class="card" aria-label="Listening now">
          <h2>Listening now</h2>
          <ul id="listeners-list" class="listener-list"></ul>
        </section>

        <section class="card" aria-label="Chat">
          <h2>Chat</h2>
          <div id="chat-messages" class="chat-log" aria-live="polite"></div>
          <p id="chat-hint" class="muted small">Connect a Nostr extension with a Trustroots NIP-05 to chat. You can still listen and read the room.</p>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" maxlength="500" placeholder="Say something…" disabled>
            <button type="submit" disabled>Send</button>
          </form>
        </section>
      </div>
    </div>

    <footer class="site-footer" role="contentinfo">
      <div class="site-footer-content">
        <ul class="site-footer-links">
          <li><a href="https://www.trustroots.org/" target="_blank" rel="noopener noreferrer">Trustroots.org</a></li>
          <li><a href="../../" target="_blank" rel="noopener noreferrer">Nostroots</a></li>
          <li><a href="https://www.trustroots.org/support" target="_blank" rel="noopener noreferrer">Support</a></li>
        </ul>
        <div class="site-footer-meta">
          <a
            id="site-footer-build"
            class="site-footer-build"
            href="https://github.com/Trustroots/nostroots"
            target="_blank"
            rel="noopener noreferrer"
