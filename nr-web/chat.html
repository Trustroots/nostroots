<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting…</title>
    <!-- Chat UI lives in index.html + chat.css (standalone chat.html was merged). -->
    <link rel="canonical" href="https://nos.trustroots.org/">
    <script>
        (function () {
            var search = window.location.search || '';
            var hash = window.location.hash || '';
            var path = window.location.pathname || '';
            var dir = path.replace(/[^/]+$/, '');
            var dest;
            try {
                if (dir === '/' || dir === '') {
                    dest = window.location.origin + '/' + search + hash;
                } else {
                    var u = new URL('index.html', window.location.origin + path);
                    u.search = search;
                    u.hash = hash;
                    dest = u.href;
                }
                var meta = document.getElementById('nr-chat-redirect-meta');
                if (meta) meta.setAttribute('content', '0; url=' + dest.replace(/"/g, '%22'));
                window.location.replace(dest);
            } catch (e) {
                try {
                    window.location.replace('index.html' + search + hash);
                } catch (e2) {
                    window.location.href = '/' + search + hash;
                }
            }
        })();
    </script>
    <meta id="nr-chat-redirect-meta" http-equiv="refresh" content="5; url=index.html">
</head>
<body>
    <p>Moved — <a id="nr-chat-fallback-link" href="index.html">Nostroots</a> (map and chat are now one app). If you are not redirected, follow the link.</p>
    <script>
        (function () {
            var a = document.getElementById('nr-chat-fallback-link');
            if (!a) return;
            var search = window.location.search || '';
            var hash = window.location.hash || '';
            var path = window.location.pathname || '';
            var dir = path.replace(/[^/]+$/, '');
            if (dir === '/' || dir === '') {
                a.href = '/' + search + hash;
            } else {
                try {
                    a.href = new URL('index.html', window.location.origin + path).pathname + search + hash;
                } catch (_) {
                    a.href = 'index.html' + search + hash;
                }
            }
        })();
    </script>
</body>
</html>
