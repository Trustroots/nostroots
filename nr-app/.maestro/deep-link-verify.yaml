appId: org.trustroots.nostroots
---
- openLink: "nostroots://e2e/reset"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- openLink: "nostroots://e2e/seed?scenario=pending-verify"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- openLink: "nostroots://verify?token=e2e-token"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- assertVisible:
    id: "screen-backup-confirm"
